name: API CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/ci.yml'

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Sync dependencies
        working-directory: ./api
        run: uv sync

      - name: Run tests
        working-directory: ./api
        run: uv run pytest --cov

      - name: Verify API docs discipline and no drift
        working-directory: ./api
        run: |
          uv run export-docs
          git diff --exit-code docs/openapi.json docs/api-reference.md
